name: Fleet Telemetry & Self-Healing

on:
  repository_dispatch:
    types: [device_crash_report]

jobs:
  triage_and_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LiveOps Branch
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Process Crash Signature
        run: |
          echo "Received crash from device: ${{ github.event.client_payload.device_model }}"
          echo "Failure Vector: ${{ github.event.client_payload.failure_vector }}"
          
          # If it's a shader compile fail, append the device to the manifest fallback list
          if [ "${{ github.event.client_payload.failure_vector }}" == "shader_compile_fail" ]; then
            echo "Patching manifest.json to force LOW profile for this device..."
            # Simple jq manipulation to add device to fallback array
            jq '. + {force_low_profile_devices: (.[].force_low_profile_devices? // [] + ["${{ github.event.client_payload.device_model }}"])}' live_content/manifest.json > tmp.json && mv temp.json live_content/manifest.json
          fi

      - name: Commit Automated Patch
        run: |
          git config user.name "Fleet Automator"
          git config user.email "automator@ittybittybites.com"
          git add live_content/manifest.json
          git commit -m "fix(fleet): automated fallback patch for ${{ github.event.client_payload.device_model }}" || echo "No changes to commit"
          git push
