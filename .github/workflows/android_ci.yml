name: Android CI / Content Validation

on:
  push:
    branches: [ "main", "release" ]
    paths-ignore:
      - 'ASSET_AUDIT.md'
      - 'PRODUCTION_READINESS_REPORT.md'
      - 'asset_creation_queue.json'
      - 'missing_assets.json'
      - 'unused_assets.json'
  pull_request:
    branches: [ "main" ]

jobs:
  validate-content:
    name: JSON Schema & Asset Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Scenario JSON Schema
        run: |
          echo "Scanning app/data/content/base_bundle for valid JSON and required keys..."
          find app/data/content/base_bundle -type f -name "*.json" | while read -r file; do
            # Handle both JSON objects and JSON arrays
            jq -e '
              if type == "array" then
                (map(has("id") and has("universe") and has("type")) | all)
              elif type == "object" then
                (has("id") and has("universe") and has("type"))
              else
                false
              end
            ' "$file" > /dev/null
            if [ $? -ne 0 ]; then
              echo "Validation Failed: $file is missing required schema keys or is malformed."
              exit 1
            fi
          done
          echo "All Scenario JSON files validated successfully."

      - name: Check Theme Integrity
        run: |
          echo "Validating Theme JSON strict formatting..."
          find app/data/themes -type f -name "*.json" | while read -r file; do
            # Accept both "visual" and "lens" as valid visual configuration keys
            jq -e '. | has("id") and (has("visual") or has("lens")) and has("tunnel")' "$file" > /dev/null
            if [ $? -ne 0 ]; then
              echo "Validation Failed: $file is missing critical theme contracts."
              exit 1
            fi
          done
          echo "All Theme configurations validated successfully."
