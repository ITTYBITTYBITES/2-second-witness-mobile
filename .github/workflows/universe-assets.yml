name: Offline Procedural Asset Concretization Pipeline

on:
  push:
    paths:
      - 'app/universes/**'

jobs:
  synthesize-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow numpy

      - name: Execute Universe Compiler (Core Orchestrator)
        run: |
          python3 app/tools/universe_compiler.py

      - name: Commit Generated Source Assets (If Missing)
        run: |
          git config --global user.name "Liquid Memory CI"
          git config --global user.email "engineering@ittybittybites.com"
          git add app/assets/
          git status
          git diff --staged --quiet || git commit -m "chore(assets): synthesize missing universe source assets deterministically via universe_compiler.py" && git push origin main || true
