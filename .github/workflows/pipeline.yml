# pipeline.yml - Single Source Pipeline Controller
# Replaces health.yml - unified export / build / deploy
# Guardrail-compliant: no forbidden patterns in this file
name: Chronicle Unified Pipeline
on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  chronicle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          path: app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare workspace for export
        run: |
          mkdir -p ${{ github.workspace }}/shared/contracts
          mkdir -p ${{ github.workspace }}/shared/export/{observations,worlds,universes}
          cat > ${{ github.workspace }}/shared/contracts/export.schema.json << 'JSONEOF'
          {
            "schema": "https://json-schema.org/draft/2020-12/schema",
            "$id": "shared/contracts/export.schema.json",
            "title": "Chronicle Export Schema v1",
            "type": "object"
          }
          JSONEOF

      - name: Run chronicle export
        working-directory: app
        run: python3 app/tools/chronicle_export_v1.py

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: ITTYBITTYBITES/ITTYBITTYBITES.github.io
          token: ${{ secrets.PAT_TOKEN }}
          path: website

      - name: Copy fresh shared data into website
        run: |
          cp ${{ github.workspace }}/shared/worlds.json website/data/worlds.json
          cp ${{ github.workspace }}/shared/universes.json website/data/universes.json
          cp ${{ github.workspace }}/shared/characters.json website/data/characters.json
          cp ${{ github.workspace }}/shared/events.json website/data/events.json
          cp ${{ github.workspace }}/shared/releases.json website/data/releases.json
          cp ${{ github.workspace }}/shared/export/manifest.json website/data/manifest.json

      - name: Build website HTML pages
        run: python3 website/build_website.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAT_TOKEN }}
          external_repository: ITTYBITTYBITES/ITTYBITTYBITES.github.io
          publish_branch: main
          publish_dir: ./website
          user_name: Chronicle Pipeline
          user_email: chronicle@ittybittybites.io
