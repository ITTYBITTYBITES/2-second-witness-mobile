name: Foundation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Godot 4.6.3
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true
      
      - name: Validate project import
        run: |
          godot --headless --import --path ./app --quit 2>&1 | tail -n 20
          echo "Import validated - zero editor errors"
      
      - name: Check branding in production code
        run: |
          echo "Checking for old branding variations in production code only (app/src, app/assets, README, project.godot)..."
          # Only check production code and assets, not audit documentation which may reference old branding historically
          # Exclude docs/foundation/PRODUCTION_READINESS_AUDIT and CLEAN_SLATE which document what was removed
          if grep -R "ITTY BITTY BYTES" --include="*.gd" --include="*.tscn" app/src/ 2>/dev/null; then
            echo "FAIL: Old branding 'ITTY BITTY BYTES' found in production code"
            exit 1
          fi
          if grep -R "Itty Bitty Bytes" --include="*.gd" --include="*.tscn" app/src/ 2>/dev/null; then
            echo "FAIL: Old branding 'Itty Bitty Bytes' found in production code"
            exit 1
          fi
          # Check README and main assets (should be clean)
          if grep -R "ITTY BITTY BYTES" README.md 2>/dev/null; then
            echo "FAIL: Old branding in README"
            exit 1
          fi
          if grep -R "Itty Bitty Bytes" README.md 2>/dev/null; then
            echo "FAIL: Old branding in README"
            exit 1
          fi
          echo "Branding check OK - ITTYBITTYBITES consistent in production code"
          echo "Note: Audit docs in docs/foundation/ may contain historical references to old branding for documentation purposes - that's allowed"
      
      - name: Verify package ID
        run: |
          grep -q "com.ittybittybites.the2secondwitness" app/export_presets.cfg
          grep -q "com.ittybittybites.the2secondwitness" app/src/systems/config/ConfigService.gd
          echo "Package ID preserved: com.ittybittybites.the2secondwitness"
      
      - name: Verify assets
        run: |
          ls -lh app/assets/splash/ittybittybites_splash.png
          ls -lh app/assets/splash/two_second_witness_splash.png
          ls -lh app/assets/brand/app_icon_1024.png
          ls -lh app/assets/brand/android/icon_foreground.png
          ls -lh app/assets/brand/android/icon_background.png
          ls -lh app/assets/gameplay/observation_challenge_01.png
          ls -lh app/assets/backgrounds/main_menu_bg.png
          echo "All production assets exist"
      
      - name: Validate export presets
        run: |
          echo "Checking export presets..."
          cat app/export_presets.cfg | grep -E "package/unique_name|version/code|version/name|launcher_icons"
          # Ensure version code is incremented for Play update (must be > old production 3.0.00, now 40000)
          if grep -q "version/code=40000" app/export_presets.cfg; then
            echo "Version code 40000 found - ready for update over existing 3.0.00 production"
          elif grep -q "version/code=101" app/export_presets.cfg; then
            echo "Version code 101 found"
          else
            # Check any version code >=100 exists
            if grep -E "version/code=[0-9]{3,}" app/export_presets.cfg; then
              echo "Version code exists and is >=100 - OK"
            else
              echo "FAIL: Version code not found or not incremented"
              exit 1
            fi
          fi
          echo "Export presets valid - production ready for existing Play listing update"
      
      - name: Validate first-run routes
        run: |
          echo "Checking first-run routes..."
          grep -q "publisher_splash" app/src/core/navigation/AppRoutes.gd
          grep -q "title_splash" app/src/core/navigation/AppRoutes.gd
          grep -q "privacy" app/src/core/navigation/AppRoutes.gd
          grep -q "tutorial" app/src/core/navigation/AppRoutes.gd
          grep -q "observation" app/src/core/navigation/AppRoutes.gd
          grep -q "memory_question" app/src/core/navigation/AppRoutes.gd
          grep -q "result" app/src/core/navigation/AppRoutes.gd
          echo "First-run routes present"
