<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070c">
  <title>Two Second Witness — Cinematic Trailer</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f0f1f5;
      --muted: #9096a5;
      --violet: #7c5cff;
      --line: rgba(255,255,255,.10);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 50% 20%, rgba(65,49,130,.18), transparent 42%),
        linear-gradient(180deg, #090b12 0%, #030408 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .14;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 100% 4px;
      mix-blend-mode: overlay;
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(28px, 6vw, 72px) 0 48px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--violet);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 45px);
      line-height: 1;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .runtime {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .stage {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: 0 30px 90px rgba(0,0,0,.55), 0 0 80px rgba(124,92,255,.07);
    }
    video {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border: 0;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.40));
      transition: opacity 180ms ease, visibility 180ms ease;
    }
    .play-overlay[hidden] { opacity: 0; visibility: hidden; display: grid; }
    .play-mark {
      display: grid;
      place-items: center;
      width: 84px;
      height: 84px;
      padding-left: 5px;
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 50%;
      background: rgba(8,9,14,.64);
      box-shadow: 0 0 50px rgba(124,92,255,.26);
      backdrop-filter: blur(10px);
      transition: transform 180ms ease, border-color 180ms ease;
    }
    .play-overlay:hover .play-mark { transform: scale(1.06); border-color: var(--violet); }
    .play-mark svg { width: 25px; margin-left: 3px; }
    .details {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
      padding: 22px 2px 0;
    }
    .tagline {
      margin: 0;
      color: #c7cad2;
      font-family: Georgia, serif;
      font-size: clamp(17px, 2vw, 22px);
      font-style: italic;
      letter-spacing: .02em;
    }
    .meta {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .hint {
      margin: 15px 0 0;
      color: #5f6572;
      font-size: 11px;
      letter-spacing: .04em;
    }
    @media (max-width: 680px) {
      header, .details { align-items: start; flex-direction: column; display: flex; }
      .runtime { display: none; }
      .meta { flex-wrap: wrap; gap: 8px 16px; }
      .play-mark { width: 66px; height: 66px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">ITTYBITTYBITES presents</p>
        <h1>Two Second Witness</h1>
      </div>
      <div class="runtime">Official cinematic reveal · 0:45</div>
    </header>

    <section class="stage" aria-label="Trailer player">
      <video id="trailer" controls preload="metadata" playsinline poster="poster.jpg">
        <source src="two_second_witness_trailer.mp4" type="video/mp4">
        <track kind="captions" src="two_second_witness_trailer.vtt" srclang="en" label="English">
        Your browser does not support HTML video.
      </video>
      <button class="play-overlay" id="play" type="button" aria-label="Play trailer">
        <span class="play-mark" aria-hidden="true">
          <svg viewBox="0 0 24 28" fill="none"><path d="M2 2.2v23.6L22 14 2 2.2Z" fill="currentColor"/></svg>
        </span>
      </button>
    </section>

    <div class="details">
      <div>
        <p class="tagline">How much can you notice in two seconds?</p>
        <p class="hint">Use the player controls for sound, captions, scrubbing, and fullscreen.</p>
      </div>
      <div class="meta" aria-label="Video details">
        <span>1080p</span><span>24 fps</span><span>Stereo</span><span>Psychological mystery</span>
      </div>
    </div>
  </main>

  <script>
    const video = document.querySelector('#trailer');
    const play = document.querySelector('#play');

    play.addEventListener('click', () => video.play());
    video.addEventListener('play', () => { play.hidden = true; });
    video.addEventListener('pause', () => { if (!video.ended) play.hidden = false; });
    video.addEventListener('ended', () => { play.hidden = false; play.setAttribute('aria-label', 'Replay trailer'); });

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space' && !/INPUT|BUTTON/.test(document.activeElement.tagName)) {
        event.preventDefault();
        video.paused ? video.play() : video.pause();
      }
      if (event.key.toLowerCase() === 'f' && document.fullscreenEnabled) {
        document.querySelector('.stage').requestFullscreen();
      }
    });
  </script>
</body>
</html>
